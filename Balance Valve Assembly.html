<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Valve Components Vocabulary</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:15px; }
.container { max-width:750px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.title { font-weight:bold; cursor:pointer; color:#111; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; cursor:pointer; color:#1a73e8; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
.small { color:#888; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

const parts = [
  {text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于结构件之间的连接紧固"},
  {text:"Spring Washer", phonetic:"/sprɪŋ ˈwɒʃər/", cn:"弹簧垫圈", desc:"通过弹性提供防松效果", words:[
    {w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/"},
    {w:"Washer", cn:"垫圈", phonetic:"/ˈwɒʃər/"}
  ]},
  {text:"Washer", phonetic:"/ˈwɒʃər/", cn:"垫圈", desc:"用于分散压力、防止松动"},
  {text:"Platform Console Valve Assembly", phonetic:"/ˈplætfɔːrm ˈkɒnsəl vælv əˈsɛmbli/", cn:"平台栏阀组", desc:"平台部分的多路阀总成", words:[
    {w:"Platform", cn:"平台", phonetic:"/ˈplætfɔːrm/"},
    {w:"Console", cn:"栏/操作台", phonetic:"/ˈkɒnsəl/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]},
  {text:"End Straight Fitting", phonetic:"/ɛnd streɪt ˈfɪtɪŋ/", cn:"端直通接头", desc:"用于管路端部直通连接", words:[
    {w:"End", cn:"端部", phonetic:"/ɛnd/"},
    {w:"Straight", cn:"直通的", phonetic:"/streɪt/"},
    {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
  ]},
  {text:"90° Union Fitting", phonetic:"/ˈnaɪnti ˈdiː ˈjuːniən ˈfɪtɪŋ/", cn:"直角组合接头", desc:"用于管路转向90°连接", words:[
    {w:"90°", cn:"90度", phonetic:"/ˈnaɪnti ˈdiː/"},
    {w:"Union", cn:"组合接头", phonetic:"/ˈjuːniən/"},
    {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
  ]},
  {text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"与螺栓配合实现紧固连接"},
  {text:"Plate", phonetic:"/pleɪt/", cn:"板", desc:"用于支撑或覆盖零部件的板材"},
  {text:"Pressure Test Port", phonetic:"/ˈprɛʃər tɛst pɔːrt/", cn:"测压接头", desc:"用于测量系统压力的接口", words:[
    {w:"Pressure", cn:"压力", phonetic:"/ˈprɛʃər/"},
    {w:"Test", cn:"测试", phonetic:"/tɛst/"},
    {w:"Port", cn:"接头/接口", phonetic:"/pɔːrt/"}
  ]},
  {text:"Multi-way Valve Housing", phonetic:"/ˈmʌlti weɪ vælv ˈhaʊzɪŋ/", cn:"多路阀罩壳", desc:"多路阀的外壳结构件", words:[
    {w:"Multi-way", cn:"多路的", phonetic:"/ˈmʌlti weɪ/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"},
    {w:"Housing", cn:"罩壳", phonetic:"/ˈhaʊzɪŋ/"}
  ]}
];

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className='item';

    let wordsHtml = '';
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word" onclick="speak('${w.w}')">
        🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span>
        </span>
      `).join('');
    }

    item.innerHTML = `
      <div class="title" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
