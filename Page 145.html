<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boom Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Upper Boom Control Harness", phonetic:"/ˈʌpər buːm kənˈtroʊl ˈhɑːrnɪs/", cn:"上臂控制线束", desc:"用于上臂的控制信号传输", words:[
    { w:"Upper", cn:"上臂", phonetic:"/ˈʌpər/" },
    { w:"Boom", cn:"臂架", phonetic:"/buːm/" },
    { w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/" },
    { w:"Harness", cn:"线束", phonetic:"/ˈhɑːrnɪs/" }
  ]},

  { text:"Boom Sensor Harness", phonetic:"/buːm ˈsɛnsər ˈhɑːrnɪs/", cn:"臂架传感器线束", desc:"臂架传感器信号传输线束", words:[
    { w:"Boom", cn:"臂架", phonetic:"/buːm/" },
    { w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/" },
    { w:"Harness", cn:"线束", phonetic:"/ˈhɑːrnɪs/" }
  ]},

  { text:"Harness", phonetic:"/ˈhɑːrnɪs/", cn:"线束", desc:"用于信号或电源连接" },

  { text:"Draw Wire Sensor", phonetic:"/drɔː waɪər ˈsɛnsər/", cn:"拉线传感器", desc:"检测位移或长度变化", words:[
    { w:"Draw", cn:"拉", phonetic:"/drɔː/" },
    { w:"Wire", cn:"线", phonetic:"/waɪər/" },
    { w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/" }
  ]},

  { text:"Angle Sensor Base", phonetic:"/ˈæŋɡəl ˈsɛnsər beɪs/", cn:"角度传感器固定座", desc:"用于固定角度传感器", words:[
    { w:"Angle", cn:"角度", phonetic:"/ˈæŋɡəl/" },
    { w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/" },
    { w:"Base", cn:"固定座", phonetic:"/beɪs/" }
  ]},

  { text:"Angle Sensor", phonetic:"/ˈæŋɡəl ˈsɛnsər/", cn:"角度传感器", desc:"检测角度变化", words:[
    { w:"Angle", cn:"角度", phonetic:"/ˈæŋɡəl/" },
    { w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/" }
  ]},

  { text:"Harness Clamp", phonetic:"/ˈhɑːrnɪs klæmp/", cn:"线夹", desc:"用于固定线束", words:[
    { w:"Harness", cn:"线束", phonetic:"/ˈhɑːrnɪs/" },
    { w:"Clamp", cn:"夹具", phonetic:"/klæmp/" }
  ]},

  { text:"Proximity Switch", phonetic:"/prɑːkˈsɪməti swɪtʃ/", cn:"接近开关", desc:"检测物体接近位置", words:[
    { w:"Proximity", cn:"接近", phonetic:"/prɑːkˈsɪməti/" },
    { w:"Switch", cn:"开关", phonetic:"/swɪtʃ/" }
  ]},

  { text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"用于分散压力" },

  { text:"Spring Washer", phonetic:"/sprɪŋ ˈwɑːʃər/", cn:"弹簧垫圈", desc:"增加螺栓预紧力", words:[
    { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
    { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},

  { text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"与螺栓配合使用" },

  { text:"Mouning Base", phonetic:"/ˈmaʊntɪŋ beɪs/", cn:"固定座", desc:"用于支撑或固定部件", words:[
    { w:"Mouning", cn:"安装/固定", phonetic:"/ˈmaʊntɪŋ/" },
    { w:"Base", cn:"座", phonetic:"/beɪs/" }
  ]},

  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于固定零件" },

  { text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接零件" },

  { text:"Pipe Clamp", phonetic:"/paɪp klæmp/", cn:"管夹", desc:"固定管道", words:[
    { w:"Pipe", cn:"管", phonetic:"/paɪp/" },
    { w:"Clamp", cn:"夹具", phonetic:"/klæmp/" }
  ]},

  { text:"Lower Control Harness", phonetic:"/ˈloʊər kənˈtroʊl ˈhɑːrnɪs/", cn:"下臂控制线束", desc:"用于下臂的控制信号传输", words:[
    { w:"Lower", cn:"下臂", phonetic:"/ˈloʊər/" },
    { w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/" },
    { w:"Harness", cn:"线束", phonetic:"/ˈhɑːrnɪs/" }
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
