<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipe & Hose Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

{
text:"Steel Pipe Assembly",
phonetic:"/stiːl paɪp əˈsɛmbli/",
cn:"钢管总成",
desc:"由钢制管路组成的液压连接组件",
words:[
{w:"Steel", cn:"钢", phonetic:"/stiːl/"},
{w:"Pipe", cn:"管", phonetic:"/paɪp/"},
{w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
]},

{
text:"Hose Clamp",
phonetic:"/hoʊz klæmp/",
cn:"管夹",
desc:"用于固定软管或管路的位置",
words:[
{w:"Hose", cn:"软管", phonetic:"/hoʊz/"},
{w:"Clamp", cn:"夹具", phonetic:"/klæmp/"}
]},

{
text:"Hose Assembly",
phonetic:"/hoʊz əˈsɛmbli/",
cn:"胶管总成",
desc:"由软管及接头组成的管路组件",
words:[
{w:"Hose", cn:"软管", phonetic:"/hoʊz/"},
{w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
]},

{
text:"Hose",
phonetic:"/hoʊz/",
cn:"胶管",
desc:"用于输送液体或气体的柔性管路"
}

];

function speak(text){
const u = new SpeechSynthesisUtterance(text);
u.lang = 'en-US';
speechSynthesis.speak(u);
}

function renderParts(){
const container = document.querySelector('.container');

parts.forEach(p=>{
const item = document.createElement('div');
item.className = 'item';

let wordsHtml = "";
if(p.words){
wordsHtml = p.words.map(w=>`
<span class="word btn" onclick="speak('${w.w}')">
🔊 ${w.w}
<span class="phonetic">${w.phonetic}</span>
<span class="small">${w.cn}</span>
</span>
`).join("");
}

item.innerHTML = `
<div class="title btn" onclick="speak('${p.text}')">
🔊 ${p.text}
<span class="phonetic">${p.phonetic}</span>
<span class="small">${p.cn}</span>
</div>
<div class="desc">${p.desc}</div>
${wordsHtml}
`;

container.appendChild(item);
});
}

window.onload = renderParts;
</script>
</body>
</html>
