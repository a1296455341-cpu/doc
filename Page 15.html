<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接零件的紧固件" },
  { text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"用于螺栓、螺母间分散压力" },
  { text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"与螺栓配合使用的紧固件" },
  { text:"U Bolt", phonetic:"/ˌjuː ˈboʊlt/", cn:"U型螺栓", desc:"用于固定圆形物体或管道", words:[
    { w:"U", cn:"U型", phonetic:"/juː/" },
    { w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
  ]},
  { text:"Platform Railing", phonetic:"/ˈplætˌfɔːrm ˈreɪlɪŋ/", cn:"围栏", desc:"平台的防护栏", words:[
    { w:"Platform", cn:"平台", phonetic:"/ˈplætˌfɔːrm/" },
    { w:"Railing", cn:"围栏", phonetic:"/ˈreɪlɪŋ/" }
  ]},
  { text:"Door Latch", phonetic:"/dɔːr lætʃ/", cn:"门闩", desc:"用于固定门扇", words:[
    { w:"Door", cn:"门", phonetic:"/dɔːr/" },
    { w:"Latch", cn:"闩", phonetic:"/lætʃ/" }
  ]},
  { text:"Mold opening control box protective shell", phonetic:"/moʊld ˈoʊpənɪŋ kənˈtroʊl bɑːks prəˈtɛktɪv ʃɛl/", cn:"开模控制箱防护壳", desc:"保护开模控制箱", words:[
    { w:"Mold", cn:"模具", phonetic:"/moʊld/" },
    { w:"opening", cn:"开模", phonetic:"/ˈoʊpənɪŋ/" },
    { w:"control", cn:"控制", phonetic:"/kənˈtroʊl/" },
    { w:"box", cn:"箱", phonetic:"/bɑːks/" },
    { w:"protective", cn:"防护", phonetic:"/prəˈtɛktɪv/" },
    { w:"shell", cn:"壳", phonetic:"/ʃɛl/" }
  ]},
  { text:"Inspection Cable Assembly", phonetic:"/ɪnˈspɛkʃən ˈkeɪbəl əˈsɛmbli/", cn:"检测拉线总成", desc:"用于检测系统的拉线组件", words:[
    { w:"Inspection", cn:"检测", phonetic:"/ɪnˈspɛkʃən/" },
    { w:"Cable", cn:"拉线", phonetic:"/ˈkeɪbəl/" },
    { w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
  ]},
  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于连接零件，可旋入螺纹孔" },
  { text:"Spring Washer", phonetic:"/sprɪŋ ˈwɑːʃər/", cn:"弹簧垫圈", desc:"用于增加螺栓预紧力", words:[
    { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
    { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Spring Draw Hook", phonetic:"/sprɪŋ drɔː hʊk/", cn:"搭扣锁", desc:"用于快速固定物体", words:[
    { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
    { w:"Draw", cn:"拉", phonetic:"/drɔː/" },
    { w:"Hook", cn:"钩", phonetic:"/hʊk/" }
  ]},
  { text:"Cushion Block", phonetic:"/ˈkʊʃən blɑːk/", cn:"垫块", desc:"用于缓冲或支撑", words:[
    { w:"Cushion", cn:"垫",
phonetic:"/ˈkʊʃən/" },
    { w:"Block", cn:"块", phonetic:"/blɑːk/" }
  ]},
  { text:"Mold Protective Cover", phonetic:"/moʊld prəˈtɛktɪv ˈkʌvər/", cn:"开模防护罩", desc:"用于保护模具", words:[
    { w:"Mold", cn:"模具", phonetic:"/moʊld/" },
    { w:"Protective", cn:"防护", phonetic:"/prəˈtɛktɪv/" },
    { w:"Cover", cn:"罩", phonetic:"/ˈkʌvər/" }
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>`).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
