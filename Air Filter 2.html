<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Flange Gasket",
    phonetic:"/flændʒ ˈɡæskɪt/",
    cn:"法兰密封垫",
    desc:"用于法兰连接面之间的密封元件，防止液体或气体泄漏",
    words:[
      {w:"Flange",p:"/flændʒ/",cn:"法兰"},
      {w:"Gasket",p:"/ˈɡæskɪt/",cn:"密封垫"}
    ]
  },
  {
    text:"Gasket",
    phonetic:"/ˈɡæskɪt/",
    cn:"密封垫",
    desc:"用于连接面之间的密封，防止介质泄漏"
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于连接和固定部件的机械紧固件"
  },
  {
    text:"Fuel Inlet Strainer",
    phonetic:"/ˈfjuːəl ˈɪnlɛt ˈstreɪnər/",
    cn:"加油滤网",
    desc:"安装在加油口处，用于过滤进入油箱的杂质",
    words:[
      {w:"Fuel",p:"/ˈfjuːəl/",cn:"燃油"},
      {w:"Inlet",p:"/ˈɪnlɛt/",cn:"入口"},
      {w:"Strainer",p:"/ˈstreɪnər/",cn:"滤网"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
