<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valve Components Vocabulary</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Balance Valve",
    phonetic:"/ˈbæl.əns vælv/",
    cn:"平衡阀",
    desc:"用于调节液压系统中流量平衡的阀",
    words:[
      {w:"Balance", cn:"平衡", phonetic:"/ˈbæl.əns/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"管路的直通端部连接件",
    words:[
      {w:"End", cn:"端", phonetic:"/ɛnd/"},
      {w:"Straight", cn:"直通的", phonetic:"/streɪt/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/naɪnti ˈdɪɡri ˈjuːniən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"90度角的管路组合接头",
    words:[
      {w:"90°", cn:"90度", phonetic:"/naɪnti ˈdɪɡri/"},
      {w:"Union", cn:"组合", phonetic:"/ˈjuːniən/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于紧固零件的螺纹紧固件"
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
