<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Lifting Plate",
    phonetic:"/ˈlɪftɪŋ pleɪt/",
    cn:"吊装板",
    desc:"用于起重作业中承载和连接其他部件的钢板",
    words:[
      {w:"Lifting",p:"/ˈlɪftɪŋ/",cn:"吊装"},
      {w:"Plate",p:"/pleɪt/",cn:"板"}
    ]
  },
  {
    text:"Cycloidal Motor",
    phonetic:"/ˌsaɪklɔɪdəl ˈmoʊtər/",
    cn:"摆线马达",
    desc:"一种减速驱动马达，通过摆线机构实现高扭矩低速输出",
    words:[
      {w:"Cycloidal",p:"/ˌsaɪklɔɪdəl/",cn:"摆线"},
      {w:"Motor",p:"/ˈmoʊtər/",cn:"马达"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/ˈnaɪnti dɪˈɡriː ˈjuːnjən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"用于管路转向连接，形成90°角",
    words:[
      {w:"90°",p:"/ˈnaɪnti dɪˈɡriː/",cn:"90度"},
      {w:"Union",p:"/ˈjuːnjən/",cn:"接头"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"连接件"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"用于管路末端的直通连接",
    words:[
      {w:"End",p:"/ɛnd/",cn:"端"},
      {w:"Straight",p:"/streɪt/",cn:"直通"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"接头"}
    ]
  },
  {
    text:"Steel Pipe Assembly",
    phonetic:"/stiːl paɪp əˈsɛmbli/",
    cn:"钢管总成",
    desc:"由钢管及配件组成的管路总成，用于液压系统输油",
    words:[
      {w:"Steel",p:"/stiːl/",cn:"钢"},
      {w:"Pipe",p:"/paɪp/",cn:"管"},
      {w:"Assembly",p:"/əˈsɛmbli/",cn:"总成"}
    ]
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于连接和固定部件的紧固件"
  },
  {
    text:"Balance Valve",
    phonetic:"/ˈbæləns vælve/",
    cn:"平衡阀",
    desc:"控制液压系统油路压力平衡，确保液压动作稳定",
    words:[
      {w:"Balance",p:"/ˈbæləns/",cn:"平衡"},
      {w:"Valve",p:"/vælve/",cn:"阀"}
    ]
  },
  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɑːʃər/",
    cn:"弹簧垫圈",
    desc:"用于防止螺栓或螺钉松动，提供弹性紧固",
    words:[
      {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
      {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
