<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components Vocabulary</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Motor Assembly",
    phonetic:"/ˈmoʊtər əˈsɛmbli/",
    cn:"马达装配",
    desc:"电机及其安装总成",
    words:[
      {w:"Motor", cn:"马达/电动机", phonetic:"/ˈmoʊtər/"},
      {w:"Assembly", cn:"总成/组件", phonetic:"/əˈsɛmbli/"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"液压管路端部直通连接件",
    words:[
      {w:"End", cn:"端", phonetic:"/ɛnd/"},
      {w:"Straight", cn:"直通的", phonetic:"/streɪt/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Hose Assembly",
    phonetic:"/hoʊs əˈsɛmbli/",
    cn:"胶管总成",
    desc:"由胶管及端头总成组成的液压管路组件",
    words:[
      {w:"Hose", cn:"胶管", phonetic:"/hoʊs/"},
      {w:"Assembly", cn:"总成/组件", phonetic:"/əˈsɛmbli/"}
    ]
  },
  {
    text:"Flow Divider/Combiner Valve Assembly",
    phonetic:"/floʊ dɪˈvaɪdər kəmˈbaɪnər vælv əˈsɛmbli/",
    cn:"分流集流阀装配",
    desc:"用于液压系统分流或合流的阀组件",
    words:[
      {w:"Flow", cn:"流量", phonetic:"/floʊ/"},
      {w:"Divider", cn:"分流器", phonetic:"/dɪˈvaɪdər/"},
      {w:"Combiner", cn:"集流器", phonetic:"/kəmˈbaɪnər/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"},
      {w:"Assembly", cn:"总成/组件", phonetic:"/əˈsɛmbli/"}
    ]
  },
  {
    text:"Swing Center Assembly",
    phonetic:"/swɪŋ ˈsɛntər əˈsɛmbli/",
    cn:"中回装配",
    desc:"液压中回部件总成",
    words:[
      {w:"Swing", cn:"回转/摆动", phonetic:"/swɪŋ/"},
      {w:"Center", cn:"中心", phonetic:"/ˈsɛntər/"},
      {w:"Assembly", cn:"总成/组件", phonetic:"/əˈsɛmbli/"}
    ]
  },
  {
    text:"Clamp",
    phonetic:"/klæmp/",
    cn:"管夹",
    desc:"用于固定管路或线束的夹具"
  },
  {
    text:"Steering Valve Assembly",
    phonetic:"/ˈstɪrɪŋ vælv əˈsɛmbli/",
    cn:"转向阀组装配",
    desc:"控制转向液压流量的阀组件",
    words:[
      {w:"Steering", cn:"转向", phonetic:"/ˈstɪrɪŋ/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"},
      {w:"Assembly", cn:"总成/组件", phonetic:"/əˈsɛmbli/"}
    ]
  },
  {
    text:"Outrigger Balance Valve",
    phonetic:"/ˈaʊtrɪɡər ˈbæləns vælv/",
    cn:"扩桥平衡阀安装",
    desc:"支腿液压平衡控制阀",
    words:[
      {w:"Outrigger", cn:"支腿/外支撑", phonetic:"/ˈaʊtrɪɡər/"},
      {w:"Balance", cn:"平衡", phonetic:"/ˈbæləns/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于紧固零件的小型螺纹件"
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
