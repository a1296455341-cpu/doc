<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooling System Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:700px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {text:"Water-side Dust Screen", phonetic:"/ˈwɔːtər saɪd dʌst skriːn/", cn:"水侧防尘网", desc:"用于防止灰尘进入水箱侧", words:[
    {w:"Water-side", cn:"水侧", phonetic:"/ˈwɔːtər saɪd/"},
    {w:"Dust", cn:"灰尘", phonetic:"/dʌst/"},
    {w:"Screen", cn:"网/屏", phonetic:"/skriːn/"}
  ]},

  {text:"Retaining Pin with Ring", phonetic:"/rɪˈteɪnɪŋ pɪn wɪð rɪŋ/", cn:"环形O型销", desc:"用于固定结构部件", words:[
    {w:"Retaining", cn:"固定的", phonetic:"/rɪˈteɪnɪŋ/"},
    {w:"Pin", cn:"销", phonetic:"/pɪn/"},
    {w:"with", cn:"带", phonetic:"/wɪð/"},
    {w:"Ring", cn:"环", phonetic:"/rɪŋ/"}
  ]},

  {text:"Radiator Cap", phonetic:"/ˈreɪdieɪtər kæp/", cn:"加水口盖", desc:"用于密封散热器加水口", words:[
    {w:"Radiator", cn:"散热器", phonetic:"/ˈreɪdieɪtər/"},
    {w:"Cap", cn:"盖", phonetic:"/kæp/"}
  ]},

  {text:"Radiator Assembly", phonetic:"/ˈreɪdieɪtər əˈsɛmbli/", cn:"水散组件", desc:"散热器整体组件", words:[
    {w:"Radiator", cn:"散热器", phonetic:"/ˈreɪdieɪtər/"},
    {w:"Assembly", cn:"组件", phonetic:"/əˈsɛmbli/"}
  ]},

  {text:"Fan Shroud Assembly", phonetic:"/fæn ʃraʊd əˈsɛmbli/", cn:"风罩组件", desc:"用于引导风流通过散热器", words:[
    {w:"Fan", cn:"风扇", phonetic:"/fæn/"},
    {w:"Shroud", cn:"风罩", phonetic:"/ʃraʊd/"},
    {w:"Assembly", cn:"组件", phonetic:"/əˈsɛmbli/"}
  ]},

  {text:"Protective Mesh Guard Assembly", phonetic:"/prəˈtɛktɪv mɛʃ ɡɑːrd əˈsɛmbli/", cn:"护网总成", desc:"用于保护散热器或风扇", words:[
    {w:"Protective", cn:"防护的", phonetic:"/prəˈtɛktɪv/"},
    {w:"Mesh", cn:"网", phonetic:"/mɛʃ/"},
    {w:"Guard", cn:"护罩", phonetic:"/ɡɑːrd/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]},

  {text:"Washer", phonetic:"/ˈwɒʃər/", cn:"垫圈", desc:"用于分散压力防松"},

  {text:"Spring Washer", phonetic:"/sprɪŋ ˈwɒʃər/", cn:"弹簧垫圈", desc:"用于防止螺栓松动", words:[
    {w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/"},
    {w:"Washer", cn:"垫圈", phonetic:"/ˈwɒʃər/"}
  ]},

  {text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于紧固连接"},

  {text:"Drain Valve", phonetic:"/dreɪn vælv/", cn:"放水开关", desc:"用于排放冷却液", words:[
    {w:"Drain", cn:"排放", phonetic:"/dreɪn/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
