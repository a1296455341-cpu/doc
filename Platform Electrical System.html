<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Load Sensor",
    phonetic:"/loʊd ˈsensər/",
    cn:"称重传感器",
    desc:"用于测量重量并将其转换为电信号输出",
    words:[
      {w:"Load",p:"/loʊd/",cn:"重量"},
      {w:"Sensor",p:"/ˈsensər/",cn:"传感器"}
    ]
  },
  {
    text:"Proximity Switch",
    phonetic:"/ˌprɑːkˈsɪmɪti swɪtʃ/",
    cn:"接近开关",
    desc:"用于检测物体接近并输出开关信号的传感器",
    words:[
      {w:"Proximity",p:"/ˌprɑːkˈsɪmɪti/",cn:"接近"},
      {w:"Switch",p:"/swɪtʃ/",cn:"开关"}
    ]
  },
  {
    text:"Harness",
    phonetic:"/ˈhɑːrnəs/",
    cn:"线束",
    desc:"由多根导线组成，用于集中连接电气系统各部件"
  },
  {
    text:"Washer",
    phonetic:"/ˈwɑːʃər/",
    cn:"垫圈",
    desc:"用于分散压力、防止松动的机械紧固件"
  },
  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɑːʃər/",
    cn:"弹簧垫圈",
    desc:"具有弹性，用于防止螺栓松动",
    words:[
      {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
      {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
    ]
  },
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"与螺母配合使用的机械紧固件"
  },
  {
    text:"Platform Control Box Assembly",
    phonetic:"/ˈplætfɔːrm kənˈtroʊl bɑːks əˈsɛmbli/",
    cn:"平台控制箱总成",
    desc:"集成平台控制系统各部件的电气箱体",
    words:[
      {w:"Platform",p:"/ˈplætfɔːrm/",cn:"平台"},
      {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
      {w:"Box",p:"/bɑːks/",cn:"箱"},
      {w:"Assembly",p:"/əˈsɛmbli/",cn:"总成"}
    ]
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于连接和固定部件的紧固件"
  },
  {
    text:"Angle Sensor",
    phonetic:"/ˈæŋɡəl ˈsensər/",
    cn:"角度传感器",
    desc:"用于检测设备角度变化并输出信号",
    words:[
      {w:"Angle",p:"/ˈæŋɡəl/",cn:"角度"},
      {w:"Sensor",p:"/ˈsensər/",cn:"传感器"}
    ]
  },
  {
    text:"Work Light",
    phonetic:"/wɜːrk laɪt/",
    cn:"照明灯",
    desc:"用于为作业区域提供照明",
    words:[
      {w:"Work",p:"/wɜːrk/",cn:"作业"},
      {w:"Light",p:"/laɪt/",cn:"灯"}
    ]
  },
  {
    text:"Sensor Cover",
    phonetic:"/ˈsensər ˈkʌvər/",
    cn:"传感器盖",
    desc:"用于保护传感器免受灰尘、水或机械损伤",
    words:[
      {w:"Sensor",p:"/ˈsensər/",cn:"传感器"},
      {w:"Cover",p:"/ˈkʌvər/",cn:"盖"}
    ]
  },
  {
    text:"Platform Control Harness",
    phonetic:"/ˈplætfɔːrm kənˈtroʊl ˈhɑːrnəs/",
    cn:"平台控制线束",
    desc:"连接平台控制箱各组件的线束，传输信号和电源",
    words:[
      {w:"Platform",p:"/ˈplætfɔːrm/",cn:"平台"},
      {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
      {w:"Harness",p:"/ˈhɑːrnəs/",cn:"线束"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
