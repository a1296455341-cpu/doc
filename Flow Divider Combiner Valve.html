<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Valve Components - Word Level</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Check Valve",
    phonetic:"/ʧɛk vælv/",
    cn:"单向阀",
    desc:"只允许液体或气体单向流动的阀",
    words:[
      {w:"Check", cn:"检查/控制", phonetic:"/ʧɛk/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"Valve",
    phonetic:"/vælv/",
    cn:"阀体",
    desc:"用于控制液体或气体流动的机械装置"
  },
  {
    text:"Relief Valve",
    phonetic:"/rɪˈliːf vælv/",
    cn:"溢流阀",
    desc:"用于限制系统压力，防止超压",
    words:[
      {w:"Relief", cn:"溢流/泄压", phonetic:"/rɪˈliːf/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"Flow Control Valve",
    phonetic:"/floʊ kənˈtroʊl vælv/",
    cn:"流量控制阀",
    desc:"用于调节液压系统的流量速度",
    words:[
      {w:"Flow", cn:"流量", phonetic:"/floʊ/"},
      {w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"Plug",
    phonetic:"/plʌg/",
    cn:"堵头",
    desc:"用于封闭管路或孔口的组件"
  },
  {
    text:"Damper",
    phonetic:"/ˈdæmpər/",
    cn:"阻尼",
    desc:"用于减缓振动或冲击的装置"
  },
  {
    text:"Solenoid Valve",
    phonetic:"/ˈsoʊlənɔɪd vælv/",
    cn:"电磁阀",
    desc:"通过电磁控制开闭的液压或气动阀",
    words:[
      {w:"Solenoid", cn:"电磁线圈", phonetic:"/ˈsoʊlənɔɪd/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  },
  {
    text:"Flush Valve",
    phonetic:"/flʌʃ vælv/",
    cn:"冲洗阀",
    desc:"用于系统冲洗或排放液体的阀",
    words:[
      {w:"Flush", cn:"冲洗", phonetic:"/flʌʃ/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
