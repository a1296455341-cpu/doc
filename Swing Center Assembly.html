<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Fittings Vocabulary - Word Level</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Rotary Joint",
    phonetic:"/ˈroʊtəri ʤɔɪnt/",
    cn:"回转接头",
    desc:"允许管路旋转而不泄漏的液压连接件",
    words:[
      {w:"Rotary", cn:"旋转的", phonetic:"/ˈroʊtəri/"},
      {w:"Joint", cn:"接头", phonetic:"/ʤɔɪnt/"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"用于连接管路的直通型接头",
    words:[
      {w:"End", cn:"端", phonetic:"/ɛnd/"},
      {w:"Straight", cn:"直通", phonetic:"/streɪt/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/ˈnaɪnti ˈdɪɡri ˈjunɪən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"形成直角的组合管路接头",
    words:[
      {w:"90°", cn:"九十度", phonetic:"/ˈnaɪnti ˈdɪɡri/"},
      {w:"Union", cn:"组合", phonetic:"/ˈjunɪən/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Three-way Union Fitting",
    phonetic:"/θriː weɪ ˈjunɪən ˈfɪtɪŋ/",
    cn:"三通组合接头",
    desc:"有三个管路接口的组合接头",
    words:[
      {w:"Three-way", cn:"三通的", phonetic:"/θriː weɪ/"},
      {w:"Union", cn:"组合", phonetic:"/ˈjunɪən/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Hose Fitting",
    phonetic:"/hoʊz ˈfɪtɪŋ/",
    cn:"管接头",
    desc:"用于软管或油管连接的接头",
    words:[
      {w:"Hose", cn:"软管/管路", phonetic:"/hoʊz/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"用于结构件之间的连接紧固"
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
