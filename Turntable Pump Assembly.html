<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Open-loop Piston Pump",
    phonetic:"/oʊpən-luːp ˈpɪstən pʌmp/",
    cn:"开式柱塞泵",
    desc:"液压泵的一种，采用开式回路供油，用于提供液压动力",
    words:[
      {w:"Open-loop",p:"/oʊpən-luːp/",cn:"开式回路"},
      {w:"Piston",p:"/ˈpɪstən/",cn:"柱塞"},
      {w:"Pump",p:"/pʌmp/",cn:"泵"}
    ]
  },
  {
    text:"Split Flange",
    phonetic:"/splɪt flændʒ/",
    cn:"对开法兰",
    desc:"由两半组成的法兰，用于管路连接，便于拆装",
    words:[
      {w:"Split",p:"/splɪt/",cn:"对开"},
      {w:"Flange",p:"/flændʒ/",cn:"法兰"}
    ]
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于连接和固定部件的紧固件"
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"用于管路末端的直通连接",
    words:[
      {w:"End",p:"/ɛnd/",cn:"端"},
      {w:"Straight",p:"/streɪt/",cn:"直通"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"接头"}
    ]
  },
  {
    text:"Closed-loop Piston Pump",
    phonetic:"/kloʊzd-luːp ˈpɪstən pʌmp/",
    cn:"闭式柱塞泵",
    desc:"液压泵的一种，采用闭式回路供油，适用于高精度液压系统",
    words:[
      {w:"Closed-loop",p:"/kloʊzd-luːp/",cn:"闭式回路"},
      {w:"Piston",p:"/ˈpɪstən/",cn:"柱塞"},
      {w:"Pump",p:"/pʌmp/",cn:"泵"}
    ]
  },
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"与螺母配合使用的紧固件"
  },
  {
    text:"O-ring",
    phonetic:"/ˈoʊ rɪŋ/",
    cn:"O形圈",
    desc:"环形密封圈，用于液压系统防止泄漏"
  },
  {
    text:"Washer",
    phonetic:"/ˈwɑːʃər/",
    cn:"垫圈",
    desc:"用于分散压力或防止紧固件松动"
  },
  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɑːʃər/",
    cn:"弹簧垫圈",
    desc:"用于防止螺栓或螺钉松动，提供弹性紧固",
    words:[
      {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
      {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
