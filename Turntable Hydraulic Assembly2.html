<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Hydraulic Reservoir Assembly",
    phonetic:"/ˈhaɪdrɔːlɪk ˈrɛzərvwɑːr əˈsembli/",
    cn:"液压油箱装配总成",
    desc:"液压系统的油箱总成，用于储存和供应液压油，保证系统正常工作",
    words:[
      {w:"Hydraulic",p:"/ˈhaɪdrɔːlɪk/",cn:"液压的"},
      {w:"Reservoir",p:"/ˈrɛzərvwɑːr/",cn:"油箱"},
      {w:"Assembly",p:"/əˈsembli/",cn:"装配总成"}
    ]
  },
  {
    text:"Hose Assembly",
    phonetic:"/hoʊs əˈsembli/",
    cn:"胶管总成",
    desc:"用于液压油路连接的胶管总成，保证流体畅通和系统密封",
    words:[
      {w:"Hose",p:"/hoʊs/",cn:"胶管"},
      {w:"Assembly",p:"/əˈsembli/",cn:"总成"}
    ]
  },
  {
    text:"Radiator Assembly",
    phonetic:"/ˈreɪdiˌeɪtər əˈsembli/",
    cn:"散热器总成",
    desc:"用于散热的总成组件，保持液压系统或发动机在合适温度下运行",
    words:[
      {w:"Radiator",p:"/ˈreɪdiˌeɪtər/",cn:"散热器"},
      {w:"Assembly",p:"/əˈsembli/",cn:"总成"}
    ]
  },
  {
    text:"Turntable Main Valve Assembly",
    phonetic:"/ˈtɜːrnˌteɪbl meɪn vælv əˈsembli/",
    cn:"转台主阀组件",
    desc:"转台液压系统的主控制阀组件，用于控制转台旋转动作",
    words:[
      {w:"Turntable",p:"/ˈtɜːrnˌteɪbl/",cn:"转台"},
      {w:"Main",p:"/meɪn/",cn:"主"},
      {w:"Valve",p:"/vælv/",cn:"阀"},
      {w:"Assembly",p:"/əˈsembli/",cn:"组件"}
    ]
  },
  {
    text:"Turntable Pump Assembly",
    phonetic:"/ˈtɜːrnˌteɪbl pʌmp əˈsembli/",
    cn:"转台泵组",
    desc:"提供转台液压动力的泵组总成，保证旋转操作顺畅",
    words:[
      {w:"Turntable",p:"/ˈtɜːrnˌteɪbl/",cn:"转台"},
      {w:"Pump",p:"/pʌmp/",cn:"泵"},
      {w:"Assembly",p:"/əˈsembli/",cn:"组"}
    ]
  },
  {
    text:"Hose Clamp",
    phonetic:"/hoʊs klæmp/",
    cn:"管夹",
    desc:"用于固定液压胶管或钢管，防止管路松动或振动",
    words:[
      {w:"Hose",p:"/hoʊs/",cn:"管"},
      {w:"Clamp",p:"/klæmp/",cn:"夹"}
    ]
  },
  {
    text:"Filter Assembly",
    phonetic:"/ˈfɪltər əˈsembli/",
    cn:"过滤器组件",
    desc:"用于液压系统或燃油系统的过滤组件，保证流体洁净",
    words:[
      {w:"Filter",p:"/ˈfɪltər/",cn:"过滤器"},
      {w:"Assembly",p:"/əˈsembli/",cn:"组件"}
    ]
  },
  {
    text:"Three-way Union Fitting",
    phonetic:"/θri weɪ ˈjuːniən ˈfɪtɪŋ/",
    cn:"三通组合接头",
    desc:"管路连接件，用于三方向液压管路分流或合流",
    words:[
      {w:"Three-way",p:"/θri weɪ/",cn:"三通"},
      {w:"Union",p:"/ˈjuːniən/",cn:"组合"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"接头"}
    ]
  },
  {
    text:"Slewing Motor Assembly",
    phonetic:"/sluːɪŋ ˈmoʊtər əˈsembli/",
    cn:"回转马达组件",
    desc:"提供回转动力的液压马达总成，用于转台旋转运动",
    words:[
      {w:"Slewing",p:"/sluːɪŋ/",cn:"回转"},
      {w:"Motor",p:"/ˈmoʊtər/",cn:"马达"},
      {w:"Assembly",p:"/əˈsembli/",cn:"组件"}
    ]
  },
  {
    text:"Separate-Mounted Emergency Pump",
    phonetic:"/ˈsɛprət ˈmaʊntɪd ɪˈmɜːrdʒənsi pʌmp/",
    cn:"应急泵分装",
    desc:"独立安装的应急泵，用于主液压系统故障时提供备用液压动力",
    words:[
      {w:"Separate-Mounted",p:"/ˈsɛprət ˈmaʊntɪd/",cn:"分装的"},
      {w:"Emergency",p:"/ɪˈmɜːrdʒənsi/",cn:"应急"},
      {w:"Pump",p:"/pʌmp/",cn:"泵"}
    ]
  },
  {
    text:"Steel Pipe Assembly",
    phonetic:"/stiːl paɪp əˈsembli/",
    cn:"钢管总成",
    desc:"液压或燃油管路的钢管总成，用于连接各组件并承受高压",
    words:[
      {w:"Steel",p:"/stiːl/",cn:"钢"},
      {w:"Pipe",p:"/paɪp/",cn:"管"},
      {w:"Assembly",p:"/əˈsembli/",cn:"总成"}
    ]
  },
  {
    text:"T-nut",
    phonetic:"/ti nʌt/",
    cn:"T型螺母",
    desc:"一种螺母，用于固定在T型槽中，便于安装紧固件",
    words:[
      {w:"T",p:"/ti/",cn:"T型"},
      {w:"Nut",p:"/nʌt/",cn:"螺母"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
