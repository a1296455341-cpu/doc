<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:700px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [

  {text:"Turntable Control Box", phonetic:"/ˈtɜːrnˌteɪbəl kənˈtroʊl bɑːks/", cn:"转台控制箱", desc:"控制转台动作", words:[
    {w:"Turntable",p:"/ˈtɜːrnˌteɪbəl/",cn:"转台"},
    {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
    {w:"Box",p:"/bɑːks/",cn:"箱"}
  ]},

  {text:"Display Control Screen", phonetic:"/dɪˈspleɪ kənˈtroʊl skriːn/", cn:"显示控制屏", desc:"显示并控制设备", words:[
    {w:"Display",p:"/dɪˈspleɪ/",cn:"显示"},
    {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
    {w:"Screen",p:"/skriːn/",cn:"屏幕"}
  ]},

  {text:"Programmable Controller", phonetic:"/ˈproʊɡræməbl kənˈtroʊlər/", cn:"可编程控制器", desc:"执行控制程序", words:[
    {w:"Programmable",p:"/ˈproʊɡræməbl/",cn:"可编程"},
    {w:"Controller",p:"/kənˈtroʊlər/",cn:"控制器"}
  ]},

  {text:"Mobile Terminal", phonetic:"/ˈmoʊbəl ˈtɜːrmɪnl/", cn:"移动终端", desc:"移动操作设备", words:[
    {w:"Mobile",p:"/ˈmoʊbəl/",cn:"移动"},
    {w:"Terminal",p:"/ˈtɜːrmɪnl/",cn:"终端"}
  ]},

  {text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"分散受力"},

  {text:"Spring Washer", phonetic:"/sprɪŋ ˈwɑːʃər/", cn:"弹簧垫圈", desc:"防止松动", words:[
    {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
    {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
  ]},

  {text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"紧固连接"}

];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic || ''}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc || ''}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
