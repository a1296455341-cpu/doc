<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steering Knuckle Basic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:700px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接和紧固零件"},

  {text:"Washer", phonetic:"/ˈwɒʃər/", cn:"垫圈", desc:"用于分散压力、防止松动"},

  {text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"用于与螺栓配合紧固"},

  {text:"Kingpin Pivot Bolt", phonetic:"/ˈkɪŋpɪn ˈpɪvət boʊlt/", cn:"主销活节螺栓", desc:"用于转向机构铰接与支撑", words:[
    {w:"Kingpin", cn:"主销", phonetic:"/ˈkɪŋpɪn/"},
    {w:"Pivot", cn:"枢轴/铰接", phonetic:"/ˈpɪvət/"},
    {w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/"}
  ]},

  {text:"Shaft", phonetic:"/ʃæft/", cn:"销轴", desc:"用于传递力或支撑旋转结构"},

  {text:"Front Left Steering Knuckle", phonetic:"/frʌnt lɛft ˈstɪrɪŋ ˈnʌkəl/", cn:"左前转向节", desc:"用于车轮转向与支撑", words:[
    {w:"Front", cn:"前", phonetic:"/frʌnt/"},
    {w:"Left", cn:"左", phonetic:"/lɛft/"},
    {w:"Steering", cn:"转向", phonetic:"/ˈstɪrɪŋ/"},
    {w:"Knuckle", cn:"转向节", phonetic:"/ˈnʌkəl/"}
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
