<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于连接零件，可旋入螺纹孔" },
  { text:"Spring Washer", cn:"弹簧垫圈", desc:"用于增加螺栓预紧力", words:[
      { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
      { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"用于螺栓、螺母间分散压力" },
  { text:"Protective Cover", cn:"防护罩", desc:"用于保护设备或部件", words:[
      { w:"Protective", cn:"防护", phonetic:"/prəˈtɛktɪv/" },
      { w:"Cover", cn:"罩", phonetic:"/ˈkʌvər/" }
  ]},
  { text:"Upper Jib Boom Weldment", cn:"上飞臂焊件", desc:"机械臂上部焊接组件", words:[
      { w:"Upper", cn:"上部", phonetic:"/ˈʌpər/" },
      { w:"Jib", cn:"飞臂", phonetic:"/dʒɪb/" },
      { w:"Boom", cn:"臂", phonetic:"/buːm/" },
      { w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/" }
  ]},
  { text:"Self-Lubricating Bearing", cn:"自润滑轴承", desc:"无需额外润滑的轴承", words:[
      { w:"Self-Lubricating", cn:"自润滑", phonetic:"/sɛlf ˈluːbrɪˌkeɪtɪŋ/" },
      { w:"Bearing", cn:"轴承", phonetic:"/ˈbɛrɪŋ/" }
  ]},
  { text:"Steel Structure High-strength Washer", cn:"钢结构用高强度垫圈", desc:"用于钢结构的高强度垫圈", words:[
      { w:"Steel", cn:"钢", phonetic:"/stiːl/" },
      { w:"Structure", cn:"结构", phonetic:"/ˈstrʌktʃər/" },
      { w:"High-strength", cn:"高强度", phonetic:"/haɪ strɛŋθ/" },
      { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Leveling Support Weldment", cn:"调平焊件", desc:"用于机械平台调平的焊接组件", words:[
      { w:"Leveling", cn:"调平", phonetic:"/ˈlɛvəlɪŋ/" },
      { w:"Support", cn:"支撑", phonetic:"/səˈpɔːrt/" },
      { w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/" }
  ]},
  { text:"Keeper Pin Weldment", cn:"销轴焊件", desc:"用于销轴固定的焊件", words:[
      { w:"Keeper", cn:"保持器", phonetic:"/ˈkiːpər/" },
      { w:"Pin", cn:"销", phonetic:"/pɪn/" },
      { w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/" }
  ]},
  { text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接零件的紧固件" },
  { text:"Shim", phonetic:"/ʃɪm/", cn:"垫片", desc:"用于调整间隙或对齐" },
  { text:"Inspection Board", cn:"检测板", desc:"用于机械部件检测", words:[
      { w:"Inspection", cn:"检测", phonetic:"/ɪnˈspɛkʃən/" },
      { w:"Board", cn:"板", phonetic:"/bɔːrd/" }
  ]},
  { text:"Lower Jib Boom Weldment", cn:"下飞臂焊件", desc:"机械臂下部焊接组件", words:[
      { w:"Lower", cn:"下部", phonetic:"/ˈloʊər/" },
      { w:"Jib", cn:"飞臂", phonetic:"/dʒɪb/" },
      { w:"Boom", cn:"臂", phonetic:"/buːm/" },
      { w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/" }
  ]},
  { text:"Keeper pin", cn:"销轴", desc:"用于固定零件的销轴", words:[
      { w:"Keeper", cn:"保持器", phonetic:"/ˈkiːpər/" },
      { w:"pin", cn:"销", phonetic:"/pɪn/" }
  ]},
  { text:"Swing Cylinder", cn:"摆动马达", desc:"控制机械臂旋转运动", words:[
      { w:"Swing", cn:"摆动", phonetic:"/swɪŋ/" },
      { w:"Cylinder", cn:"油缸/马达", phonetic:"/ˈsɪlɪndər/" }
  ]},
  { text:"Bracket", phonetic:"/ˈbrækɪt/", cn:"支架", desc:"用于支撑或固定零件" }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>`).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        ${p.phonetic ? `<span class="phonetic">${p.phonetic}</span>` : ""}
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
