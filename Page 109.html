<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Turntable Weldment Assembly", cn:"转台焊接总成", desc:"机械转台总成组件", words:[
      { w:"Turntable", cn:"转台", phonetic:"/ˈtɜːrnˌteɪbl/" },
      { w:"Weldment", cn:"焊接件", phonetic:"/ˈwɛldmənt/" },
      { w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
  ]},
  { text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接零件的紧固件" },
  { text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"用于螺栓、螺母间分散压力" },
  { text:"Cotter Pin", cn:"开口销", desc:"用于固定螺栓或轴的开口销", words:[
      { w:"Cotter", cn:"开口", phonetic:"/ˈkɑːtər/" },
      { w:"Pin", cn:"销", phonetic:"/pɪn/" }
  ]},
  { text:"Keeper pin", cn:"销轴", desc:"用于固定零件的销轴", words:[
      { w:"Keeper", cn:"保持器", phonetic:"/ˈkiːpər/" },
      { w:"pin", cn:"销", phonetic:"/pɪn/" }
  ]},
  { text:"Plate", phonetic:"/pleɪt/", cn:"板", desc:"平板零件" },
  { text:"Spring Washer", cn:"弹簧垫圈", desc:"用于增加螺栓预紧力", words:[
      { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
      { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Rotating Shaft", cn:"轴焊合", desc:"机械旋转轴组件", words:[
      { w:"Rotating", cn:"旋转", phonetic:"/ˈroʊteɪtɪŋ/" },
      { w:"Shaft", cn:"轴", phonetic:"/ʃæft/" }
  ]},
  { text:"Bent Plate", cn:"弯板", desc:"弯曲形状的板材", words:[
      { w:"Bent", cn:"弯曲", phonetic:"/bɛnt/" },
      { w:"Plate", cn:"板", phonetic:"/pleɪt/" }
  ]},
  { text:"Bracket", phonetic:"/ˈbrækɪt/", cn:"支架", desc:"用于支撑或固定零件" },
  { text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"与螺栓配合使用的紧固件" },
  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于连接零件，可旋入螺纹孔" },
  { text:"Cushion Block", cn:"垫块", desc:"用于缓冲或支撑", words:[
      { w:"Cushion", cn:"垫", phonetic:"/ˈkʊʃən/" },
      { w:"Block", cn:"块", phonetic:"/blɑːk/" }
  ]},
  { text:"Clamping Plate", cn:"压板", desc:"用于固定零件的压紧板", words:[
      { w:"Clamping", cn:"压紧", phonetic:"/ˈklæmpɪŋ/" },
      { w:"Plate", cn:"板", phonetic:"/pleɪt/" }
  ]},
  { text:"Battery Hold-down Rod", cn:"蓄电池固定拉杆", desc:"用于固定蓄电池的拉杆", words:[
      { w:"Battery", cn:"蓄电池", phonetic:"/ˈbætəri/" },
      { w:"Hold-down", cn:"固定", phonetic:"/hoʊld daʊn/" },
      { w:"Rod", cn:"拉杆", phonetic:"/rɑːd/" }
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>`).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        ${p.phonetic ? `<span class="phonetic">${p.phonetic}</span>` : ""}
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
