<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Filter Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:700px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container">

<script>
const parts = [
  {text:"Filter Mesh", phonetic:"/ˈfɪltər mɛʃ/", cn:"滤网", desc:"用于过滤空气中的杂质", words:[
    {w:"Filter", cn:"滤", phonetic:"/ˈfɪltər/"},
    {w:"Mesh", cn:"网", phonetic:"/mɛʃ/"}
  ]},
  {text:"T-bolt Clamp", phonetic:"/tiː boʊlt klæmp/", cn:"T型抱箍", desc:"用于紧固管道或管接头", words:[
    {w:"T-bolt", cn:"T型螺栓", phonetic:"/tiː boʊlt/"},
    {w:"Clamp", cn:"抱箍", phonetic:"/klæmp/"}
  ]},
  {text:"Air Filter", phonetic:"/ɛər ˈfɪltər/", cn:"空气滤清器", desc:"用于净化进入发动机的空气", words:[
    {w:"Air", cn:"空气", phonetic:"/ɛər/"},
    {w:"Filter", cn:"滤清器", phonetic:"/ˈfɪltər/"}
  ]},
  {text:"Air Filter Sensor Connector", phonetic:"/ɛər ˈfɪltər ˈsɛnsər kəˈnɛktər/", cn:"空滤传感器接头", desc:"用于连接空气滤清器传感器", words:[
    {w:"Air", cn:"空气", phonetic:"/ɛər/"},
    {w:"Filter", cn:"滤清器", phonetic:"/ˈfɪltər/"},
    {w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/"},
    {w:"Connector", cn:"接头", phonetic:"/kəˈnɛktər/"}
  ]},
  {text:"Pressure Differential Indicator", phonetic:"/ˈprɛʃər ˌdɪfərɛnʃəl ˈɪndɪkeɪtər/", cn:"压差指示器", desc:"用于显示空气滤清器的压差情况", words:[
    {w:"Pressure", cn:"压力", phonetic:"/ˈprɛʃər/"},
    {w:"Differential", cn:"差压", phonetic:"/ˌdɪfərɛnʃəl/"},
    {w:"Indicator", cn:"指示器", phonetic:"/ˈɪndɪkeɪtər/"}
  ]},
  {text:"Air Intake Hose", phonetic:"/ɛər ˈɪnteɪk hoʊz/", cn:"进气管", desc:"用于输送空气到发动机", words:[
    {w:"Air", cn:"空气", phonetic:"/ɛər/"},
    {w:"Intake", cn:"进气", phonetic:"/ˈɪnteɪk/"},
    {w:"Hose", cn:"管", phonetic:"/hoʊz/"}
  ]},
  {text:"Hose Clamp", phonetic:"/hoʊz klæmp/", cn:"喉箍", desc:"用于固定软管或管道", words:[
    {w:"Hose", cn:"管", phonetic:"/hoʊz/"},
    {w:"Clamp", cn:"抱箍", phonetic:"/klæmp/"}
  ]},
  {text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接和紧固零部件"},
  {text:"Bent Plate", phonetic:"/bɛnt pleɪt/", cn:"弯板", desc:"用于支撑或固定零部件的弯曲板材", words:[
    {w:"Bent", cn:"弯曲", phonetic:"/bɛnt/"},
    {w:"Plate", cn:"板", phonetic:"/pleɪt/"}
  ]},
  {text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"用于与螺栓配合紧固的零件"},
  {text:"Washer", phonetic:"/ˈwɒʃər/", cn:"垫圈", desc:"用于分散压力、防止松动的辅助件"},
  {text:"Air Filter Clamp", phonetic:"/ɛər ˈfɪltər klæmp/", cn:"空滤抱箍", desc:"用于固定空气滤清器", words:[
    {w:"Air", cn:"空气", phonetic:"/ɛər/"},
    {w:"Filter", cn:"滤清器", phonetic:"/ˈfɪltər/"},
    {w:"Clamp", cn:"抱箍", phonetic:"/klæmp/"}
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</div>
</body>
</html>
