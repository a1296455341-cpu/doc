<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Electrical Vocabulary (Word-Level Learning)</title>

<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:820px; margin:auto; }

.item {
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }

.word {
  display:block;
  margin-left:10px;
  margin-top:4px;
}

.btn { cursor:pointer; color:#1a73e8; }

.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>

<body>
<div class="container"></div>

<script>
const parts = [

  {
    text:"Platform Control Box",
    phonetic:"/ˈplætfɔːrm kənˈtroʊl bɒks/",
    cn:"平台控制箱",
    desc:"用于平台操作与控制的电气控制箱",
    words:[
      {w:"Platform", cn:"平台", phonetic:"/ˈplætfɔːrm/"},
      {w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/"},
      {w:"Box", cn:"箱", phonetic:"/bɒks/"}
    ]
  },

  {
    text:"Programmable Controller",
    phonetic:"/ˈproʊɡræməbl kənˈtroʊlər/",
    cn:"可编程控制器",
    desc:"通过程序控制设备运行的控制器（类似PLC）",
    words:[
      {w:"Programmable", cn:"可编程的", phonetic:"/ˈproʊɡræməbl/"},
      {w:"Controller", cn:"控制器", phonetic:"/kənˈtroʊlər/"}
    ]
  },

  {
    text:"Electric Joystick Assembly",
    phonetic:"/ɪˈlɛktrɪk ˈdʒɔɪstɪk əˈsɛmbli/",
    cn:"电操作手柄部件",
    desc:"用于控制设备动作方向和速度的电动操纵杆组件",
    words:[
      {w:"Electric", cn:"电动的", phonetic:"/ɪˈlɛktrɪk/"},
      {w:"Joystick", cn:"操纵杆", phonetic:"/ˈdʒɔɪstɪk/"},
      {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
    ]
  },

  {
    text:"Washer",
    phonetic:"/ˈwɒʃər/",
    cn:"垫圈",
    desc:"用于分散压力、防止连接松动"
  },

  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于小型零件紧固连接"
  },

  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɒʃər/",
    cn:"弹簧垫圈",
    desc:"利用弹性防止螺纹连接松动",
    words:[
      {w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/"},
      {w:"Washer", cn:"垫圈", phonetic:"/ˈwɒʃər/"}
    ]
  },

  {
    text:"Nut",
    phonetic:"/nʌt/",
    cn:"螺母",
    desc:"与螺栓配合实现紧固连接"
  }

];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');

  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
