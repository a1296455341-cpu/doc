<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cylinder Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Cylinder Barrel Assembly", phonetic:"/ˈsɪlɪndər ˈbærəl əˈsɛmbli/", cn:"缸筒总成", desc:"液压缸的主要壳体", words:[
    { w:"Cylinder", cn:"缸筒", phonetic:"/ˈsɪlɪndər/" },
    { w:"Barrel", cn:"筒体", phonetic:"/ˈbærəl/" },
    { w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
  ]},
  { text:"Piston Rod Assembly", phonetic:"/ˈpɪstən rɑːd əˈsɛmbli/", cn:"活塞杆总成", desc:"连接活塞和外部负载", words:[
    { w:"Piston", cn:"活塞", phonetic:"/ˈpɪstən/" },
    { w:"Rod", cn:"杆", phonetic:"/rɑːd/" },
    { w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/" }
  ]},
  { text:"Cylinder Head", phonetic:"/ˈsɪlɪndər hɛd/", cn:"缸盖", desc:"封闭缸体顶部", words:[
    { w:"Cylinder", cn:"缸筒", phonetic:"/ˈsɪlɪndər/" },
    { w:"Head", cn:"盖", phonetic:"/hɛd/" }
  ]},
  { text:"Bushing", phonetic:"/ˈbʊʃɪŋ/", cn:"衬套/轴套", desc:"用于支撑和减磨" },
  { text:"Internal Retaining Ring", phonetic:"/ɪnˈtɜːrnəl rɪˈteɪnɪŋ rɪŋ/", cn:"钢丝挡圈-孔用", desc:"用于固定轴或部件在孔内", words:[
    { w:"Internal", cn:"内的", phonetic:"/ɪnˈtɜːrnəl/" },
    { w:"Retaining", cn:"固定", phonetic:"/rɪˈteɪnɪŋ/" },
    { w:"Ring", cn:"挡圈", phonetic:"/rɪŋ/" }
  ]},
  { text:"Piston", phonetic:"/ˈpɪstən/", cn:"活塞", desc:"在缸体内运动传递力" },
  { text:"Steel Ball", phonetic:"/stiːl bɔːl/", cn:"钢球", desc:"用于阀门或滚动支撑", words:[
    { w:"Steel", cn:"钢", phonetic:"/stiːl/" },
    { w:"Ball", cn:"球", phonetic:"/bɔːl/" }
  ]},
  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于连接零件" },
  { text:"Protective Sleeve", phonetic:"/prəˈtɛktɪv sliːv/", cn:"护套", desc:"用于保护部件不受磨损", words:[
    { w:"Protective", cn:"防护", phonetic:"/prəˈtɛktɪv/" },
    { w:"Sleeve", cn:"套/护套", phonetic:"/sliːv/" }
  ]},
  { text:"Clamp", phonetic:"/klæmp/", cn:"喉箍", desc:"用于固定软管或管道" },
  { text:"Seal Kit", phonetic:"/siːl kɪt/", cn:"密封件维修包", desc:"用于更换液压缸密封件", words:[
    { w:"Seal", cn:"密封件", phonetic:"/siːl/" },
    { w:"Kit", cn:"包/套件", phonetic:"/kɪt/" }
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
