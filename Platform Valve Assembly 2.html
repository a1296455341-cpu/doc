<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"与螺母配合使用的紧固件"
  },
  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɑːʃər/",
    cn:"弹簧垫圈",
    desc:"用于防止螺栓或螺钉松动，提供弹性紧固",
    words:[
      {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
      {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
    ]
  },
  {
    text:"Washer",
    phonetic:"/ˈwɑːʃər/",
    cn:"垫圈",
    desc:"用于分散压力或防止紧固件松动"
  },
  {
    text:"Platform Console Valve Assembly",
    phonetic:"/ˈplætˌfɔːrm ˈkɒnsəʊl vælve əˈsɛmbli/",
    cn:"平台栏阀组",
    desc:"安装在平台上的多路液压阀组件，用于控制液压动作",
    words:[
      {w:"Platform",p:"/ˈplætˌfɔːrm/",cn:"平台"},
      {w:"Console",p:"/ˈkɒnsəʊl/",cn:"栏"},
      {w:"Valve",p:"/vælve/",cn:"阀"},
      {w:"Assembly",p:"/əˈsɛmbli/",cn:"组件"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"用于管路末端的直通连接",
    words:[
      {w:"End",p:"/ɛnd/",cn:"端"},
      {w:"Straight",p:"/streɪt/",cn:"直通"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"接头"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/ˈnaɪnti dɪˈɡriː ˈjuːnjən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"用于管路转向连接，形成90°角",
    words:[
      {w:"90°",p:"/ˈnaɪnti dɪˈɡriː/",cn:"90度"},
      {w:"Union",p:"/ˈjuːnjən/",cn:"接头"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"连接件"}
    ]
  },
  {
    text:"Nut",
    phonetic:"/nʌt/",
    cn:"螺母",
    desc:"与螺栓配合使用的紧固件"
  },
  {
    text:"Plate",
    phonetic:"/pleɪt/",
    cn:"板",
    desc:"用于支撑或固定其他组件的金属板"
  },
  {
    text:"Pressure Test Port",
    phonetic:"/ˈprɛʃər tɛst pɔːrt/",
    cn:"测压接头",
    desc:"用于液压系统压力测试的接口",
    words:[
      {w:"Pressure",p:"/ˈprɛʃər/",cn:"压力"},
      {w:"Test",p:"/tɛst/",cn:"测试"},
      {w:"Port",p:"/pɔːrt/",cn:"接口"}
    ]
  },
  {
    text:"Directional Valve Housing",
    phonetic:"/daɪˈrɛkʃənl vælve ˈhaʊzɪŋ/",
    cn:"多路阀罩壳",
    desc:"用于保护和支撑多路阀内部零件的外壳",
    words:[
      {w:"Directional",p:"/daɪˈrɛkʃənl/",cn:"方向"},
      {w:"Valve",p:"/vælve/",cn:"阀"},
      {w:"Housing",p:"/ˈhaʊzɪŋ/",cn:"罩壳"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
