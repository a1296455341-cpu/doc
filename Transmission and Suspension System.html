<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outrigger & Engine Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:700px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接和紧固零件"},

  {text:"Fan", phonetic:"/fæn/", cn:"风扇", desc:"用于产生气流或散热"},

  {text:"Diesel Engine", phonetic:"/ˈdiːzəl ˈendʒɪn/", cn:"发动机", desc:"提供动力的内燃机", words:[
    {w:"Diesel", cn:"柴油", phonetic:"/ˈdiːzəl/"},
    {w:"Engine", cn:"发动机", phonetic:"/ˈendʒɪn/"}
  ]},

  {text:"Limit Plate", phonetic:"/ˈlɪmɪt pleɪt/", cn:"限位板", desc:"用于限制运动范围", words:[
    {w:"Limit", cn:"限制", phonetic:"/ˈlɪmɪt/"},
    {w:"Plate", cn:"板", phonetic:"/pleɪt/"}
  ]},

  {text:"Front Left Outrigger Weldment", phonetic:"/frʌnt lɛft ˈaʊtrɪɡər ˈwɛldmənt/", cn:"左前支脚焊件", desc:"左前支撑结构焊接件", words:[
    {w:"Front", cn:"前", phonetic:"/frʌnt/"},
    {w:"Left", cn:"左", phonetic:"/lɛft/"},
    {w:"Outrigger", cn:"支腿", phonetic:"/ˈaʊtrɪɡər/"},
    {w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/"}
  ]},

  {text:"Rear Left Outrigger Weldment", phonetic:"/rɪr lɛft ˈaʊtrɪɡər ˈwɛldmənt/", cn:"左后支脚焊件", desc:"左后支撑结构焊接件", words:[
    {w:"Rear", cn:"后", phonetic:"/rɪr/"},
    {w:"Left", cn:"左", phonetic:"/lɛft/"},
    {w:"Outrigger", cn:"支腿", phonetic:"/ˈaʊtrɪɡər/"},
    {w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/"}
  ]},

  {text:"Washer", phonetic:"/ˈwɒʃər/", cn:"垫圈", desc:"用于分散压力、防松"},

  {text:"Flange", phonetic:"/flændʒ/", cn:"法兰盘", desc:"用于连接管道或部件"},

  {text:"Flange Coupling", phonetic:"/flændʒ ˈkʌplɪŋ/", cn:"法兰联轴器", desc:"用于连接两轴传递扭矩", words:[
    {w:"Flange", cn:"法兰", phonetic:"/flændʒ/"},
    {w:"Coupling", cn:"联轴器", phonetic:"/ˈkʌplɪŋ/"}
  ]},

  {text:"Steel Structure High-pressure Washer", phonetic:"/stiːl ˈstrʌktʃər haɪ ˈprɛʃər ˈwɒʃər/", cn:"钢结构用高强度垫圈", desc:"用于高强度连接防松", words:[
    {w:"Steel", cn:"钢", phonetic:"/stiːl/"},
    {w:"Structure", cn:"结构", phonetic:"/ˈstrʌktʃər/"},
    {w:"High-pressure", cn:"高压", phonetic:"/haɪ ˈprɛʃər/"},
    {w:"Washer", cn:"垫圈", phonetic:"/ˈwɒʃər/"}
  ]},

  {text:"Front Right Outrigger Weldment", phonetic:"/frʌnt raɪt ˈaʊtrɪɡər ˈwɛldmənt/", cn:"右前支脚焊件", desc:"右前支撑结构焊件", words:[
    {w:"Front", cn:"前", phonetic:"/frʌnt/"},
    {w:"Right", cn:"右", phonetic:"/raɪt/"},
    {w:"Outrigger", cn:"支腿", phonetic:"/ˈaʊtrɪɡər/"},
    {w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/"}
  ]},

  {text:"Oil Drain Valve", phonetic:"/ɔɪl dreɪn vælv/", cn:"放油阀", desc:"用于排放润滑油", words:[
    {w:"Oil", cn:"油", phonetic:"/ɔɪl/"},
    {w:"Drain", cn:"排放", phonetic:"/dreɪn/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},

  {text:"Rear Right Outrigger Weldment", phonetic:"/rɪr raɪt ˈaʊtrɪɡər ˈwɛldmənt/", cn:"右后支脚焊件", desc:"右后支撑结构焊件", words:[
    {w:"Rear", cn:"后", phonetic:"/rɪr/"},
    {w:"Right", cn:"右", phonetic:"/raɪt/"},
    {w:"Outrigger", cn:"支腿", phonetic:"/ˈaʊtrɪɡər/"},
    {w:"Weldment", cn:"焊件", phonetic:"/ˈwɛldmənt/"}
  ]},

  {text:"Shock Absorber", phonetic:"/ʃɑk əbˈzɔːrbər/", cn:"减震器", desc:"用于吸收震动", words:[
    {w:"Shock", cn:"冲击", phonetic:"/ʃɑk/"},
    {w:"Absorber", cn:"吸收器", phonetic:"/əbˈzɔːrbər/"}
  ]},

  {text:"Shock Absorber Plate", phonetic:"/ʃɑk əbˈzɔːrbər pleɪt/", cn:"减震器垫板", desc:"用于减震器安装支撑", words:[
    {w:"Shock", cn:"冲击", phonetic:"/ʃɑk/"},
    {w:"Absorber", cn:"减震器", phonetic:"/əbˈzɔːrbər/"},
    {w:"Plate", cn:"板", phonetic:"/pleɪt/"}
  ]},

  {text:"Nut", phonetic:"/nʌt/", cn:"螺母", desc:"用于配合螺栓紧固"}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
