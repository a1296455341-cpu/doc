<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mechanical Parts</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:950px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  { text:"Bolt", phonetic:"/boʊlt/", cn:"螺栓", desc:"用于连接零件的紧固件" },
  { text:"Spring Washer", cn:"弹簧垫圈", desc:"用于增加螺栓预紧力", words:[
      { w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/" },
      { w:"Washer", cn:"垫圈", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Washer", phonetic:"/ˈwɑːʃər/", cn:"垫圈", desc:"用于螺栓、螺母间分散压力" },
  { text:"Inspection Board", cn:"检测板", desc:"用于检测的板件", words:[
      { w:"Inspection", cn:"检测", phonetic:"/ɪnˈspɛkʃən/" },
      { w:"Board", cn:"板", phonetic:"/bɔːrd/" }
  ]},
  { text:"Sensor Washer", cn:"传感器垫片", desc:"用于传感器安装的垫片", words:[
      { w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/" },
      { w:"Washer", cn:"垫片", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Board", phonetic:"/bɔːrd/", cn:"板", desc:"平板零件" },
  { text:"Screw", phonetic:"/skruː/", cn:"螺钉", desc:"用于连接零件，可旋入螺纹孔" },
  { text:"Self-lubricating Bearing", cn:"自润滑轴承", desc:"用于减小摩擦的自润滑轴承", words:[
      { w:"Self-lubricating", cn:"自润滑", phonetic:"/sɛlf ˈluːbrɪkeɪtɪŋ/" },
      { w:"Bearing", cn:"轴承", phonetic:"/ˈbɛrɪŋ/" }
  ]},
  { text:"Shim", phonetic:"/ʃɪm/", cn:"调整垫片", desc:"用于调整零件间隙的垫片" },
  { text:"Kinpin Pivot Bolt", cn:"主销活节螺栓", desc:"用于主销旋转连接的螺栓", words:[
      { w:"Kinpin", cn:"主销", phonetic:"/ˈkɪnpɪn/" },
      { w:"Pivot", cn:"枢轴", phonetic:"/ˈpɪvət/" },
      { w:"Bolt", cn:"螺栓", phonetic:"/boʊlt/" }
  ]},
  { text:"Keeper Pin", cn:"销轴", desc:"用于固定零件的销轴", words:[
      { w:"Keeper", cn:"保持器", phonetic:"/ˈkiːpər/" },
      { w:"Pin", cn:"销", phonetic:"/pɪn/" }
  ]},
  { text:"Copper Washer", cn:"铜垫片", desc:"用于密封或支撑的铜垫片", words:[
      { w:"Copper", cn:"铜", phonetic:"/ˈkɑːpər/" },
      { w:"Washer", cn:"垫片", phonetic:"/ˈwɑːʃər/" }
  ]},
  { text:"Block", phonetic:"/blɑːk/", cn:"挡块", desc:"用于限制或挡住零件移动" },
  { text:"Front Right Outrigger", cn:"右前支腿", desc:"机械右前支撑腿", words:[
      { w:"Front", cn:"前", phonetic:"/frʌnt/" },
      { w:"Right", cn:"右", phonetic:"/raɪt/" },
      { w:"Outrigger", cn:"支腿", phonetic:"/ˈaʊtrɪgər/" }
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>`).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        ${p.phonetic ? `<span class="phonetic">${p.phonetic}</span>` : ""}
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
