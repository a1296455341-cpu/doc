<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Learning</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container">

<script>
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}
</script>

<script>
const dict = {
Bolt:["/boʊlt/","螺栓"],
Washer:["/ˈwɒʃər/","垫圈"],
Nut:["/nʌt/","螺母"],
Bar:["/bɑːr/","栏"],
Frame:["/freɪm/","框架"],
Door:["/dɔːr/","门"],
Latch:["/lætʃ/","门闩"],
Mold:["/moʊld/","模具"],
Opening:["/ˈoʊpənɪŋ/","开启"],
Control:["/kənˈtroʊl/","控制"],
Box:["/bɒks/","箱"],
Protective:["/prəˈtektɪv/","防护的"],
Shell:["/ʃel/","壳"],
Heel:["/hiːl/","块"],
Inspection:["/ɪnˈspekʃən/","检测"],
Cable:["/ˈkeɪbl/","拉线"],
Assembly:["/əˈsembli/","总成"],
Screw:["/skruː/","螺钉"],
Spring:["/sprɪŋ/","弹簧"],
Draw:["/drɔː/","拉"],
Hook:["/hʊk/","钩"],
Cover:["/ˈkʌvər/","防护罩"],
Shaped:["/ʃeɪpt/","形状的"]
};

function renderWords(words){
  return words.map(w=>`
    <span class="word btn" onclick="speak('${w}')">🔊 ${w}
      <span class="small">${dict[w]?.[0]||""} ${dict[w]?.[1]||""}</span>
    </span>
  `).join("");
}

function addItem(text, phonetic, cn, desc){
  const words = text.replace("-", " ").split(" ");
  document.write(`
  <div class="item">
    <div class="title btn" onclick="speak('${text}')">
      🔊 ${text} <span class="phonetic">${phonetic}</span>
      <span class="small">${cn}</span>
    </div>
    <div class="desc">${desc}</div>
    ${words.length>1 ? renderWords(words) : ""}
  </div>
  `);
}
</script>

<script>
addItem("Bolt","/boʊlt/","螺栓","用于连接和紧固零部件的常见紧固件");
addItem("Washer","/ˈwɒʃər/","垫圈","用于分散压力、防止松动的辅助件");
addItem("Nut","/nʌt/","螺母","与螺栓配合使用的紧固件");
addItem("U-Shaped Bolt","/ˈjuː ʃeɪpt boʊlt/","U型螺栓","用于管件或结构固定的U形紧固件");
addItem("Bar Frame","/bɑːr freɪm/","围栏","用于防护和围挡的结构框架");
addItem("Door Latch","/dɔːr lætʃ/","门闩","用于锁定或固定门的位置");
addItem("Mold Opening Control Box Protective Shell","/moʊld ˈoʊpənɪŋ kənˈtroʊl bɒks prəˈtektɪv ʃel/","开模控制箱防护壳","用于保护控制箱内部元件的外壳");
addItem("Heel","/hiːl/","块","用于支撑或定位的块状零件");
addItem("Inspection Cable Assembly","/ɪnˈspekʃən ˈkeɪbl əˈsembli/","检测拉线总成","用于检测或控制信号传输的拉线组件");
addItem("Screw","/skruː/","螺钉","用于紧固连接的小型螺纹件");
addItem("Spring Washer","/sprɪŋ ˈwɒʃər/","弹簧垫圈","用于防止松动的弹性垫圈");
addItem("Bolt","/boʊlt/","定制螺栓","根据特殊需求设计的螺栓");
addItem("Spring Draw Hook","/sprɪŋ drɔː hʊk/","搭扣锁","用于快速锁紧和释放的连接装置");
addItem("Heel","/hiːl/","垫块","用于支撑或调节高度的垫块");
addItem("Cover","/ˈkʌvər/","开模防护罩","用于保护内部结构的外部罩壳");
</script>

</div>
</body>
</html>
