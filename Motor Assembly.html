<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components Vocabulary</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Axial Piston Motor",
    phonetic:"/ˈæksɪəl ˈpɪstən ˈmoʊtər/",
    cn:"轴向柱塞马达",
    desc:"用于液压系统将液压能转换为机械旋转能的马达",
    words:[
      {w:"Axial", cn:"轴向的", phonetic:"/ˈæksɪəl/"},
      {w:"Piston", cn:"柱塞", phonetic:"/ˈpɪstən/"},
      {w:"Motor", cn:"马达/电动机", phonetic:"/ˈmoʊtər/"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"液压管路端部直通连接件",
    words:[
      {w:"End", cn:"端", phonetic:"/ɛnd/"},
      {w:"Straight", cn:"直通的", phonetic:"/streɪt/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"Balance Valve Fitting",
    phonetic:"/ˈbæləns vælv ˈfɪtɪŋ/",
    cn:"平衡阀接头",
    desc:"用于连接平衡阀的液压接头",
    words:[
      {w:"Balance", cn:"平衡", phonetic:"/ˈbæləns/"},
      {w:"Valve", cn:"阀", phonetic:"/vælv/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/naɪnti ˈdɪˌɡri ˈjuːnjən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"液压管路90度连接接头",
    words:[
      {w:"90°", cn:"九十度", phonetic:"/naɪnti ˈdɪˌɡri/"},
      {w:"Union", cn:"组合", phonetic:"/ˈjuːnjən/"},
      {w:"Fitting", cn:"接头", phonetic:"/ˈfɪtɪŋ/"}
    ]
  },
  {
    text:"O-ring",
    phonetic:"/ˈoʊ rɪŋ/",
    cn:"O形圈",
    desc:"用于液压密封的圆形橡胶圈"
  },
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"用于结构件之间的紧固连接"
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
