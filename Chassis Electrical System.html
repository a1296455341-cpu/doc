<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control System Vocabulary</title>

<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:820px; margin:auto; }

.item {
  background:#fff;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }

.word {
  display:block;
  margin-left:10px;
  margin-top:4px;
}

.btn { cursor:pointer; color:#1a73e8; }

.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>

<body>
<div class="container"></div>

<script>
const parts = [

  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于小型零件紧固连接的螺纹紧固件"
  },

  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɒʃər/",
    cn:"弹簧垫圈",
    desc:"通过弹性防止螺纹连接松动",
    words:[
      {w:"Spring", cn:"弹簧", phonetic:"/sprɪŋ/"},
      {w:"Washer", cn:"垫圈", phonetic:"/ˈwɒʃər/"}
    ]
  },

  {
    text:"Washer",
    phonetic:"/ˈwɒʃər/",
    cn:"垫圈",
    desc:"用于分散压力、防止连接松动"
  },

  {
    text:"Programmable Controller",
    phonetic:"/ˈproʊɡræməbl kənˈtroʊlər/",
    cn:"可编程控制器",
    desc:"通过程序控制设备运行的控制器（类似PLC）",
    words:[
      {w:"Programmable", cn:"可编程的", phonetic:"/ˈproʊɡræməbl/"},
      {w:"Controller", cn:"控制器", phonetic:"/kənˈtroʊlər/"}
    ]
  },

  {
    text:"Angle Sensor",
    phonetic:"/ˈæŋɡəl ˈsɛnsər/",
    cn:"角度传感器",
    desc:"用于检测角度变化并输出电信号的传感器",
    words:[
      {w:"Angle", cn:"角度", phonetic:"/ˈæŋɡəl/"},
      {w:"Sensor", cn:"传感器", phonetic:"/ˈsɛnsər/"}
    ]
  },

  {
    text:"Proximity Switch",
    phonetic:"/prɒkˈsɪmɪti swɪtʃ/",
    cn:"接近开关",
    desc:"通过检测物体接近实现无接触开关控制",
    words:[
      {w:"Proximity", cn:"接近", phonetic:"/prɒkˈsɪmɪti/"},
      {w:"Switch", cn:"开关", phonetic:"/swɪtʃ/"}
    ]
  },

  {
    text:"Chassis Control Harness",
    phonetic:"/ˈʃæsi kənˈtroʊl ˈhɑːrnɪs/",
    cn:"下车控制线束",
    desc:"连接底盘控制系统各电气元件的线束",
    words:[
      {w:"Chassis", cn:"底盘", phonetic:"/ˈʃæsi/"},
      {w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/"},
      {w:"Harness", cn:"线束", phonetic:"/ˈhɑːrnɪs/"}
    ]
  },

  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"用于结构件连接的螺纹紧固件"
  },

  {
    text:"Wire Clamp",
    phonetic:"/waɪər klæmp/",
    cn:"线夹",
    desc:"用于固定电线或线束位置的夹具",
    words:[
      {w:"Wire", cn:"电线", phonetic:"/waɪər/"},
      {w:"Clamp", cn:"夹具", phonetic:"/klæmp/"}
    ]
  }

];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');

  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';

    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.phonetic}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }

    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;

    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</body>
</html>
