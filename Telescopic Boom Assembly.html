<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boom Assemblies</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:900px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container">

<script>
const parts = [
  {text:"Base Boom Assembly", phonetic:"/beɪs buːm əˈsɛmbli/", cn:"一节臂总成", desc:"起支撑作用的第一节臂总成", words:[
    {w:"Base", cn:"一节臂", phonetic:"/beɪs/"},
    {w:"Boom", cn:"臂", phonetic:"/buːm/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]},
  {text:"Second Boom Assembly", phonetic:"/ˈsɛkənd buːm əˈsɛmbli/", cn:"二节臂总成", desc:"第二节臂总成，延伸结构", words:[
    {w:"Second", cn:"二节臂", phonetic:"/ˈsɛkənd/"},
    {w:"Boom", cn:"臂", phonetic:"/buːm/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]},
  {text:"Third Boom Assembly", phonetic:"/θɜːrd buːm əˈsɛmbli/", cn:"三节臂总成", desc:"第三节臂总成，继续延伸", words:[
    {w:"Third", cn:"三节臂", phonetic:"/θɜːrd/"},
    {w:"Boom", cn:"臂", phonetic:"/buːm/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]},
  {text:"Fourth Boom Assembly", phonetic:"/fɔːrθ buːm əˈsɛmbli/", cn:"四节臂总成", desc:"第四节臂总成，最长延伸臂", words:[
    {w:"Fourth", cn:"四节臂", phonetic:"/fɔːrθ/"},
    {w:"Boom", cn:"臂", phonetic:"/buːm/"},
    {w:"Assembly", cn:"总成", phonetic:"/əˈsɛmbli/"}
  ]}
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`<span class="word btn" onclick="speak('${w.w}')">🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span></span>`).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span></div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>

</div>
</body>
</html>
