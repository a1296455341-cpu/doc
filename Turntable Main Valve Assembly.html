<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Main Valve Mounting Plate",
    phonetic:"/meɪn vælve ˈmaʊntɪŋ pleɪt/",
    cn:"主阀安装板",
    desc:"用于安装主阀的固定板，提供稳定支撑",
    words:[
      {w:"Main",p:"/meɪn/",cn:"主"},
      {w:"Valve",p:"/vælve/",cn:"阀"},
      {w:"Mounting",p:"/ˈmaʊntɪŋ/",cn:"安装"},
      {w:"Plate",p:"/pleɪt/",cn:"板"}
    ]
  },
  {
    text:"Bolt",
    phonetic:"/boʊlt/",
    cn:"螺栓",
    desc:"与螺母配合使用的紧固件"
  },
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于连接和固定部件的机械紧固件"
  },
  {
    text:"Spring Washer",
    phonetic:"/sprɪŋ ˈwɑːʃər/",
    cn:"弹簧垫圈",
    desc:"具有弹性，用于防止螺栓或螺钉松动",
    words:[
      {w:"Spring",p:"/sprɪŋ/",cn:"弹簧"},
      {w:"Washer",p:"/ˈwɑːʃər/",cn:"垫圈"}
    ]
  },
  {
    text:"90° Union Fitting",
    phonetic:"/ˈnaɪnti dɪˈɡriː ˈjuːnjən ˈfɪtɪŋ/",
    cn:"直角组合接头",
    desc:"用于管路转向连接，形成90°角",
    words:[
      {w:"90°",p:"/ˈnaɪnti dɪˈɡriː/",cn:"90度"},
      {w:"Union",p:"/ˈjuːnjən/",cn:"接头"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"连接件"}
    ]
  },
  {
    text:"End Straight Fitting",
    phonetic:"/ɛnd streɪt ˈfɪtɪŋ/",
    cn:"端直通接头",
    desc:"用于管路末端直通连接",
    words:[
      {w:"End",p:"/ɛnd/",cn:"端"},
      {w:"Straight",p:"/streɪt/",cn:"直通"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"接头"}
    ]
  },
  {
    text:"Three-way Union Fitting",
    phonetic:"/ˈθriː weɪ ˈjuːnjən ˈfɪtɪŋ/",
    cn:"三通组合接头",
    desc:"用于三方向管路连接的组合接头",
    words:[
      {w:"Three-way",p:"/ˈθriː weɪ/",cn:"三通"},
      {w:"Union",p:"/ˈjuːnjən/",cn:"接头"},
      {w:"Fitting",p:"/ˈfɪtɪŋ/",cn:"连接件"}
    ]
  },
  {
    text:"Pressure Test Port",
    phonetic:"/ˈprɛʃər tɛst pɔːrt/",
    cn:"测压接头",
    desc:"用于液压系统压力测试的接口",
    words:[
      {w:"Pressure",p:"/ˈprɛʃər/",cn:"压力"},
      {w:"Test",p:"/tɛst/",cn:"测试"},
      {w:"Port",p:"/pɔːrt/",cn:"接口"}
    ]
  },
  {
    text:"Check Valve",
    phonetic:"/tʃɛk vælve/",
    cn:"单向阀",
    desc:"只允许介质单向流动，防止倒流",
    words:[
      {w:"Check",p:"/tʃɛk/",cn:"检查/单向"},
      {w:"Valve",p:"/vælve/",cn:"阀"}
    ]
  },
  {
    text:"Electrically Controlled Directional Valve",
    phonetic:"/ɪˈlɛktrɪkli kənˈtroʊld daɪˈrɛkʃənl vælve/",
    cn:"电控多路阀",
    desc:"通过电控实现液压流向切换的多路阀",
    words:[
      {w:"Electrically",p:"/ɪˈlɛktrɪkli/",cn:"电控"},
      {w:"Controlled",p:"/kənˈtroʊld/",cn:"控制"},
      {w:"Directional",p:"/daɪˈrɛkʃənl/",cn:"方向"},
      {w:"Valve",p:"/vælve/",cn:"阀"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
