<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screw Vocabulary</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:15px; }
.container { max-width:600px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.title { font-weight:bold; cursor:pointer; color:#111; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; cursor:pointer; color:#1a73e8; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
.small { color:#888; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

const data = [
  {
    text:"Screw",
    phonetic:"/skruː/",
    cn:"螺钉",
    desc:"用于小型零件紧固连接的螺纹件"
  }
];

function render(){
const container = document.querySelector(".container");
data.forEach(item=>{
const div = document.createElement("div");
div.className="item";
div.innerHTML=`
<div class="title" onclick="speak('${item.text}')">
🔊 ${item.text} <span class="phonetic">${item.phonetic}</span> <span class="small">${item.cn}</span>
</div>
<div class="desc">${item.desc}</div>
`;
container.appendChild(div);
});
}

render();
</script>
</body>
</html>
