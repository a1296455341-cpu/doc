<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Valve Components Vocabulary</title>
<style>
body { font-family: Arial; background:#f4f6f8; padding:15px; }
.container { max-width:750px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
.title { font-weight:bold; cursor:pointer; color:#111; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; cursor:pointer; color:#1a73e8; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
.small { color:#888; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

const parts = [
  {text:"Spool Valve", phonetic:"/spuːl vælv/", cn:"梭阀", desc:"用于控制液压油流动方向", words:[
    {w:"Spool", cn:"阀芯", phonetic:"/spuːl/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},
  {text:"Check Valve", phonetic:"/ʧɛk vælv/", cn:"单向阀", desc:"允许液体单向流动", words:[
    {w:"Check", cn:"单向的", phonetic:"/ʧɛk/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},
  {text:"Solenoid Valve", phonetic:"/ˈsoʊlənɔɪd vælv/", cn:"电磁阀", desc:"通过电磁控制液压油流", words:[
    {w:"Solenoid", cn:"电磁线圈", phonetic:"/ˈsoʊlənɔɪd/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},
  {text:"Flow Control Valve", phonetic:"/floʊ kənˈtroʊl vælv/", cn:"流量控制阀", desc:"用于调节液压油流量", words:[
    {w:"Flow", cn:"流量", phonetic:"/floʊ/"},
    {w:"Control", cn:"控制", phonetic:"/kənˈtroʊl/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},
  {text:"Pressure Compensating Valve", phonetic:"/ˈprɛʃər ˈkɒmpənˌseɪtɪŋ vælv/", cn:"压力补偿阀", desc:"用于补偿系统压力变化保持流量恒定", words:[
    {w:"Pressure", cn:"压力", phonetic:"/ˈprɛʃər/"},
    {w:"Compensating", cn:"补偿的", phonetic:"/ˈkɒmpənˌseɪtɪŋ/"},
    {w:"Valve", cn:"阀", phonetic:"/vælv/"}
  ]},
  {text:"Damper", phonetic:"/ˈdæmpər/", cn:"阻尼", desc:"用于减缓液压系统冲击或振动"}
];

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className='item';

    let wordsHtml = '';
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word" onclick="speak('${w.w}')">
        🔊 ${w.w} <span class="phonetic">${w.phonetic}</span> <span class="small">${w.cn}</span>
        </span>
      `).join('');
    }

    item.innerHTML = `
      <div class="title" onclick="speak('${p.text}')">
        🔊 ${p.text} <span class="phonetic">${p.phonetic}</span> <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
