<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrical Components</title>
<style>
body { font-family: Arial; background:#f5f6f7; padding:15px; }
.container { max-width:800px; margin:auto; }
.item { background:#fff; padding:12px; margin-bottom:12px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.08);}
.title { font-weight:bold; }
.desc { color:#666; font-size:14px; margin-top:4px; }
.word { display:block; margin-left:10px; margin-top:4px; }
.btn { cursor:pointer; color:#1a73e8; }
.small { color:#888; font-size:13px; margin-left:6px; }
.phonetic { color:#999; font-size:13px; margin-left:6px; }
</style>
</head>
<body>
<div class="container"></div>

<script>
const parts = [
  {
    text:"Control Box",
    phonetic:"/kənˈtroʊl bɑːks/",
    cn:"控制柜",
    desc:"用于放置和保护电气控制设备的外壳箱体",
    words:[
      {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
      {w:"Box",p:"/bɑːks/",cn:"柜"}
    ]
  },
  {
    text:"Emergency Stop Button",
    phonetic:"/ɪˈmɜːrdʒənsi stɑːp ˈbʌtn/",
    cn:"急停按钮",
    desc:"用于紧急情况下立即切断设备电源以确保安全",
    words:[
      {w:"Emergency",p:"/ɪˈmɜːrdʒənsi/",cn:"紧急"},
      {w:"Stop",p:"/stɑːp/",cn:"停止"},
      {w:"Button",p:"/ˈbʌtn/",cn:"按钮"}
    ]
  },
  {
    text:"Buzzer",
    phonetic:"/ˈbʌzər/",
    cn:"蜂鸣器",
    desc:"发出声音信号提示设备状态或警告"
    // 单词只有一个，不拆分
  },
  {
    text:"Key Switch",
    phonetic:"/kiː swɪtʃ/",
    cn:"点火开关",
    desc:"通过钥匙操作控制设备的通电或启动",
    words:[
      {w:"Key",p:"/kiː/",cn:"钥匙"},
      {w:"Switch",p:"/swɪtʃ/",cn:"开关"}
    ]
  },
  {
    text:"Rotary Switch",
    phonetic:"/ˈroʊtəri swɪtʃ/",
    cn:"钮子开关",
    desc:"旋转操作选择不同电路或功能的开关",
    words:[
      {w:"Rotary",p:"/ˈroʊtəri/",cn:"旋转的"},
      {w:"Switch",p:"/swɪtʃ/",cn:"开关"}
    ]
  },
  {
    text:"Cap",
    phonetic:"/kæp/",
    cn:"防水帽",
    desc:"用于覆盖接口或按钮以防水、防尘"
    // 单词只有一个，不拆分
  },
  {
    text:"Turntable Control Box Harness",
    phonetic:"/ˈtɜːrnˌteɪbl kənˈtroʊl bɑːks ˈhɑːrnəs/",
    cn:"转台控制箱线束",
    desc:"连接转台控制箱内部各组件的线束，保证信号和电源传输",
    words:[
      {w:"Turntable",p:"/ˈtɜːrnˌteɪbl/",cn:"转台"},
      {w:"Control",p:"/kənˈtroʊl/",cn:"控制"},
      {w:"Box",p:"/bɑːks/",cn:"箱"},
      {w:"Harness",p:"/ˈhɑːrnəs/",cn:"线束"}
    ]
  },
  {
    text:"Battery Relay",
    phonetic:"/ˈbætəri ˈriːleɪ/",
    cn:"蓄电池继电器",
    desc:"控制电池电路通断的电子开关元件",
    words:[
      {w:"Battery",p:"/ˈbætəri/",cn:"蓄电池"},
      {w:"Relay",p:"/ˈriːleɪ/",cn:"继电器"}
    ]
  }
];

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  speechSynthesis.speak(u);
}

function renderParts(){
  const container = document.querySelector('.container');
  parts.forEach(p=>{
    const item = document.createElement('div');
    item.className = 'item';
    let wordsHtml = "";
    if(p.words){
      wordsHtml = p.words.map(w=>`
        <span class="word btn" onclick="speak('${w.w}')">
          🔊 ${w.w}
          <span class="phonetic">${w.p}</span>
          <span class="small">${w.cn}</span>
        </span>
      `).join("");
    }
    item.innerHTML = `
      <div class="title btn" onclick="speak('${p.text}')">
        🔊 ${p.text}
        <span class="phonetic">${p.phonetic}</span>
        <span class="small">${p.cn}</span>
      </div>
      <div class="desc">${p.desc}</div>
      ${wordsHtml}
    `;
    container.appendChild(item);
  });
}

window.onload = renderParts;
</script>
</body>
</html>
